<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Khmer Dubbing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.box{
  max-width:500px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

button{
  background:#22c55e;
  border:none;
  padding:10px 20px;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

video{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>🎬 MP4 → Khmer AI Dubbing</h2>

<input type="file" id="file" accept="video/*">
<br>

<button onclick="upload()">Upload Video</button>

<div id="result" style="display:none;margin-top:20px;">

<h3>Original Text</h3>
<p id="original"></p>

<h3>Khmer Text</h3>
<p id="khmer"></p>

<h3>🎥 Output Video</h3>
<video id="video" controls></video>

<br><br>

<a id="download" download="khmer-dubbed.mp4">
<button>⬇ Download Video</button>
</a>

</div>

</div>

<script>
async function upload(){

    const file=document.getElementById("file").files[0];

    if(!file){
        alert("Select video first");
        return;
    }

    const form=new FormData();
    form.append("file",file);

    const res=await fetch("https://YOUR-NODE-URL/upload-video",{
        method:"POST",
        body:form
    });

    const data=await res.json();

    document.getElementById("result").style.display="block";

    document.getElementById("original").innerText=data.original_text;
    document.getElementById("khmer").innerText=data.khmer_text;

    const videoURL="https://YOUR-NODE-URL/files/"+data.video;

    document.getElementById("video").src=videoURL;
    document.getElementById("download").href=videoURL;
}
</script>

</body>
</html>
